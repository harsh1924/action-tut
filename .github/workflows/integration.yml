name: "Integration Test Workflow"

on:
    push:
        branches:
        - main
    pull_request:
        branches:
        - main

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [18.x,20.x, 22.x]

        steps:
            - uses: actions/checkout@v4
            - name: ${{matrix.node-version}} - Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{matrix.node-version}}
                  cache: "npm"
            - run: npm run build
            - run: npm test 